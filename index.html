<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gaceta Grúas Metropolitanas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>Costos por Gaceta</h1>
        <p>Grúas Metropolitanas</p>
      </div>
    </header>

    <main class="container">
      <section class="card form-card">
        <h2>Datos del servicio</h2>

        <div class="grid">
          <div class="field">
            <label>Número de servicio</label>
            <input type="text" id="numeroServicio" placeholder="Ej. GM-0001" />
          </div>

          <div class="field">
            <label>Fecha</label>
            <input type="date" id="fecha" />
          </div>

          <div class="field">
            <label>Tipo de servicio</label>
            <select id="tipoServicio">
              <option value="siniestro">Siniestro</option>
              <option value="asistencia">Asistencia</option>
            </select>
          </div>

          <div class="field">
            <label>Tipo de grúa</label>
            <select id="tipoGrua">
              <option value="A">Tipo A</option>
              <option value="B">Tipo B</option>
              <option value="C">Tipo C</option>
              <option value="D">Tipo D</option>
            </select>
          </div>

          <div class="field">
            <label>Placas</label>
            <input type="text" id="placas" placeholder="ABC123A" />
          </div>

          <div class="field">
            <label>Marca</label>
            <input type="text" id="marca" placeholder="Marca del vehículo" />
          </div>

          <div class="field full">
            <label>Origen</label>
            <input type="text" id="origen" placeholder="Lugar de origen" />
          </div>

          <div class="field full">
            <label>Destino</label>
            <input type="text" id="destino" placeholder="Lugar de destino" />
          </div>

          <div class="field">
            <label>Kilómetros</label>
            <input type="number" id="kilometros" placeholder="0" min="0" />
          </div>

          <div class="field">
            <label>Días de pensión</label>
            <input type="number" id="diasPension" placeholder="0" min="0" />
          </div>

          <div class="field">
            <label>Maniobras</label>
            <input type="number" id="maniobras" placeholder="0" min="0" />
          </div>

          <div class="field">
            <label>Abanderamiento</label>
            <select id="abanderamiento">
              <option value="no">No</option>
              <option value="si">Sí</option>
            </select>
          </div>

          <div class="field">
            <label>Corralón</label>
            <select id="corralon">
              <option value="no">No</option>
              <option value="si">Sí</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button id="btnCalcular">Calcular</button>
        </div>
      </section>

      <section class="card result-card">
        <h2>Resultado</h2>

        <div class="result-list">
          <div class="result-item">
            <span>Banderazo</span>
            <strong id="rBanderazo">$0.00</strong>
          </div>
          <div class="result-item">
            <span>Traslado</span>
            <strong id="rTraslado">$0.00</strong>
          </div>
          <div class="result-item">
            <span>Maniobras</span>
            <strong id="rManiobras">$0.00</strong>
          </div>
          <div class="result-item">
            <span>Abanderamiento</span>
            <strong id="rAbanderamiento">$0.00</strong>
          </div>
          <div class="result-item">
            <span>Corralón</span>
            <strong id="rCorralon">$0.00</strong>
          </div>
          <div class="result-item">
            <span>Pensión</span>
            <strong id="rPension">$0.00</strong>
          </div>
          <div class="result-item total">
            <span>Total</span>
            <strong id="rTotal">$0.00</strong>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
