<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Gaceta Grúas Metropolitanas</title>

  <!-- Logo navegador -->
  <link rel="icon" type="image/png" href="logo.png">

  <!-- Logo celular -->
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="shortcut icon" href="logo.png">

  <!-- Web App -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e3a8a">

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <img src="logo.png" alt="Logo Grúas Metropolitanas" class="logo" />
        <div>
          <h1>Gaceta Grúas Metropolitanas</h1>
          <p>Sistema de Costos</p>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="card form-card">
        <h2>Datos del servicio</h2>

        <div class="grid">
          <div class="field">
            <label>Número de servicio</label>
            <input type="text" id="numeroServicio" placeholder="Ej. GM-0001" />
          </div>

          <div class="field">
            <label>Fecha</label>
            <input type="date" id="fecha" />
          </div>

          <div class="field">
            <label>Hora</label>
            <input type="time" id="hora" />
          </div>

          <div class="field">
            <label>Tipo de servicio</label>
            <select id="tipoServicio">
              <option value="siniestro">Siniestro</option>
              <option value="asistencia">Asistencia</option>
            </select>
          </div>

          <div class="field">
            <label>Tipo de grúa principal</label>
            <select id="tipoGrua">
              <option value="A">Tipo A</option>
              <option value="B">Tipo B</option>
              <option value="C">Tipo C</option>
              <option value="D">Tipo D</option>
            </select>
          </div>

          <div class="field">
            <label>Placas del auto</label>
            <input type="text" id="placas" placeholder="ABC123A" />
          </div>

          <div class="field">
            <label>Marca del auto</label>
            <input type="text" id="marca" placeholder="Marca del vehículo" />
          </div>

          <div class="field full">
            <label>Origen</label>
            <input type="text" id="origen" placeholder="Lugar de origen" />
          </div>

          <div class="field full">
            <label>Destino</label>
            <input type="text" id="destino" placeholder="Lugar de destino" />
          </div>

          <div class="field">
            <label>Kilómetros</label>
            <input type="number" id="kilometros" placeholder="0" min="0" step="0.01" />
          </div>

          <div class="field">
            <label>Horas de espera</label>
            <input type="number" id="horasEspera" placeholder="0" min="0" step="0.01" />
          </div>

          <div class="field">
            <label>Horas maniobra grúa principal</label>
            <input type="number" id="horasManiobra" placeholder="0" min="0" step="0.01" />
          </div>

          <div class="field">
            <label>Abanderamiento grúa</label>
            <select id="abanderamientoGrua">
              <option value="no">No</option>
              <option value="si">Sí</option>
            </select>
          </div>

          <div class="field">
            <label>Horas abanderamiento grúa</label>
            <input type="number" id="horasAbanderamientoGrua" placeholder="0" min="0" step="0.01" />
          </div>

          <div class="field">
            <label>Abanderamiento manual</label>
            <select id="abanderamientoManual">
              <option value="no">No</option>
              <option value="si">Sí</option>
            </select>
          </div>

          <div class="field">
            <label>Horas abanderamiento manual</label>
            <input type="number" id="horasAbanderamientoManual" placeholder="0" min="0" step="0.01" />
          </div>

          <div class="field">
            <label>Corralón</label>
            <select id="corralon">
              <option value="no">No</option>
              <option value="si">Sí</option>
            </select>
          </div>

        </div>

        <div id="seccionCorralon" class="extra-box hidden">
          <h3>Datos de corralón</h3>

          <div class="grid">

            <div class="field">
              <label>Fecha de ingreso</label>
              <input type="date" id="fechaIngresoCorralon" />
            </div>

            <div class="field">
              <label>Fecha actual / salida</label>
              <input type="date" id="fechaSalidaCorralon" />
            </div>

            <div class="field">
              <label>Tipo de unidad</label>
              <select id="tipoUnidadCorralon">
                <option value="">Selecciona</option>
                <option value="bicicleta_motocicleta">Bicicleta y motocicleta</option>
                <option value="automovil_vagoneta">Automóvil o vagoneta</option>
                <option value="camionetas_microbus">Camionetas y microbús</option>
                <option value="camion_rabon_torton">Camión rabón o torton</option>
                <option value="autobus_remolque_maquinaria">Autobús o maquinaria</option>
              </select>
            </div>

            <div class="field">
              <label>Días de pensión</label>
              <input type="number" id="diasPension" readonly />
            </div>

          </div>
        </div>

        <div class="extra-box iva-box">
          <label>
            <input type="checkbox" id="aplicarIVA">
            Aplicar IVA 16%
          </label>
        </div>

        <div class="actions">
          <button id="btnCalcular">Calcular</button>
          <button id="btnWord">Exportar Word</button>
          <button id="btnExcel">Exportar Excel</button>
        </div>

      </section>

      <section class="card result-card">
        <h2>Resultado</h2>

        <div class="result-list">
          <div class="result-item">
            <span>Total</span>
            <strong id="rTotal">$0.00</strong>
          </div>
        </div>

      </section>

    </main>
  </div>

<script src="script.js"></script>

</body>
</html>
